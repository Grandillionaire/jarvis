<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="J.A.R.V.I.S. reactor monogram">
  <defs>
    <radialGradient id="fa_disc" cx="50%" cy="42%" r="62%">
      <stop offset="0%" stop-color="#143246"/>
      <stop offset="55%" stop-color="#0c1f2e"/>
      <stop offset="100%" stop-color="#070f18"/>
    </radialGradient>
    <radialGradient id="fa_core" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="22%" stop-color="#d6fbff"/>
      <stop offset="48%" stop-color="#6ef2ff"/>
      <stop offset="78%" stop-color="#19e0ff"/>
      <stop offset="100%" stop-color="#0a6f80"/>
    </radialGradient>
    <radialGradient id="fa_bloom" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9af6ff" stop-opacity="0.55"/>
      <stop offset="42%" stop-color="#19e0ff" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#19e0ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fa_ringedge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6ef2ff"/>
      <stop offset="100%" stop-color="#0a6f80"/>
    </linearGradient>
    <linearGradient id="fa_j" gradientUnits="userSpaceOnUse" x1="108" y1="84" x2="120" y2="172">
      <stop offset="0%" stop-color="#caf9ff"/>
      <stop offset="50%" stop-color="#5fefff"/>
      <stop offset="100%" stop-color="#19e0ff"/>
    </linearGradient>
    <filter id="fa_glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- backing chip / disc -->
  <circle cx="128" cy="128" r="120" fill="url(#fa_disc)"/>
  <circle cx="128" cy="128" r="120" fill="none" stroke="#19e0ff" stroke-width="2.5" opacity="0.7"/>
  <circle cx="128" cy="128" r="112" fill="none" stroke="#19e0ff" stroke-width="1" opacity="0.2"/>

  <!-- segmented outer ring -->
  <g fill="none" stroke="url(#fa_ringedge)">
    <circle cx="128" cy="128" r="98" stroke-width="9" opacity="0.30"/>
    <circle cx="128" cy="128" r="98" stroke-width="9" opacity="0.85"
            stroke-dasharray="51.3 10.0" stroke-dashoffset="5"/>
  </g>
  <circle cx="128" cy="128" r="88.5" fill="none" stroke="#0a6f80" stroke-width="1.4" opacity="0.7"/>

  <!-- fine tick marks -->
  <g stroke="#6ef2ff" stroke-width="1.6" opacity="0.8">
    <g transform="translate(128 128)">
      <line x1="0" y1="-83" x2="0" y2="-75"/>
      <line x1="0" y1="-83" x2="0" y2="-75" transform="rotate(30)"/>
      <line x1="0" y1="-83" x2="0" y2="-75" transform="rotate(60)"/>
      <line x1="0" y1="-83" x2="0" y2="-75" transform="rotate(90)"/>
      <line x1="0" y1="-83" x2="0" y2="-75" transform="rotate(120)"/>
      <line x1="0" y1="-83" x2="0" y2="-75" transform="rotate(150)"/>
      <line x1="0" y1="-83" x2="0" y2="-75" transform="rotate(180)"/>
      <line x1="0" y1="-83" x2="0" y2="-75" transform="rotate(210)"/>
      <line x1="0" y1="-83" x2="0" y2="-75" transform="rotate(240)"/>
      <line x1="0" y1="-83" x2="0" y2="-75" transform="rotate(270)"/>
      <line x1="0" y1="-83" x2="0" y2="-75" transform="rotate(300)"/>
      <line x1="0" y1="-83" x2="0" y2="-75" transform="rotate(330)"/>
    </g>
  </g>

  <!-- inner machined ring around core -->
  <circle cx="128" cy="128" r="60" fill="none" stroke="#0a6f80" stroke-width="6" opacity="0.5"/>
  <circle cx="128" cy="128" r="60" fill="none" stroke="#19e0ff" stroke-width="2" opacity="0.55"
          stroke-dasharray="3 6"/>

  <!-- additive bloom behind core (polish, non-load-bearing) -->
  <circle cx="128" cy="128" r="54" fill="url(#fa_bloom)" filter="url(#fa_glow)"/>

  <!-- THE J as energy core: crossbar serif, tall stem, hook curving down-left
       into the hot core. Sized to sit cleanly inside the r=60 inner ring.
       Drawn solid first so identity survives if glow is stripped. -->
  <g filter="url(#fa_glow)">
    <!-- crossbar -->
    <path d="M 108 88 L 150 88"
          fill="none" stroke="url(#fa_j)" stroke-width="14.5" stroke-linecap="round"/>
    <!-- vertical stem -->
    <path d="M 143 88 L 143 150"
          fill="none" stroke="url(#fa_j)" stroke-width="14.5" stroke-linecap="round"/>
    <!-- hook curving down-left into the core -->
    <path d="M 143 150 A 27 27 0 0 1 107 167"
          fill="none" stroke="url(#fa_j)" stroke-width="14.5" stroke-linecap="round"/>
  </g>

  <!-- glowing hot core at the J hook terminal -->
  <g filter="url(#fa_glow)">
    <circle cx="101" cy="163" r="14.5" fill="#19e0ff" opacity="0.85"/>
    <circle cx="101" cy="163" r="14.5" fill="url(#fa_core)"/>
    <circle cx="101" cy="163" r="14.5" fill="none" stroke="#eafdff" stroke-width="1.8" opacity="0.9"/>
  </g>
  <circle cx="101" cy="163" r="6" fill="#ffffff"/>
</svg>